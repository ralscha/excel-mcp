version: "2"

linters:
  enable:
    - errcheck        # Check for unchecked errors
    - gocritic        # Extensive code quality checks
    - gosec           # Security-focused static analysis
    - prealloc        # Suggest preallocating slices
    - unconvert       # Detect unnecessary type conversions
    - unparam         # Find unused function parameters
    - misspell        # Find commonly misspelled words
    - nolintlint      # Ensure nolint directives are properly formatted
    - revive          # Replacement for golint
    - errorlint       # Find issues with error wrapping
    - exhaustive      # Check exhaustiveness of enum switch statements
    - nilerr          # Find code that returns nil instead of error
    - whitespace      # Detect leading/trailing whitespace issues
  settings:
    goconst:
      ignore-tests: true
      min-occurrences: 5
    gosec:
      excludes:
        - G304 # MCP file server intentionally accepts file paths from users
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true

output:
  formats:
    text:
      print-linter-name: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: "_test.go"
      text: "context-as-argument"
      linters:
        - revive
    - path: "_test.go"
      text: "context.Context should be the first parameter"
      linters:
        - revive
